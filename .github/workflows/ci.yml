name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfuse3-dev protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test --workspace

      - name: Release gate (fixture corpus)
        run: |
          cargo run --release -p semanticfs-cli -- --config config/semanticfs.sample.toml benchmark release-gate --refresh --fixture-repo tests/fixtures/benchmark_repo --soak-seconds 2

      - name: Long soak sign-off (short CI profile)
        run: |
          cargo run --release -p semanticfs-cli -- --config config/semanticfs.sample.toml benchmark soak --duration-seconds 5 --fixture-repo tests/fixtures/benchmark_repo --max-soak-p95-ms 250 --max-errors 0 --max-rss-mb 2048

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semanticfs-bench-artifacts
          path: .semanticfs/bench/*.json

[workspace]
repo_root = "__HOME_ROOT__"
mount_point = "__MOUNT_POINT__"

[workspace.scheduler]
max_watch_targets = 0
max_scan_targets = 24

[[workspace.domains]]
id = "home_catchall"
root = "__HOME_ROOT__"
trust_label = "untrusted"
watch_enabled = false
watch_priority = 10
allow_roots = ["*.txt", "*.md", "*.json", "*.toml", "*.py", "*.sh"]
deny_globs = []

[[workspace.domains]]
id = "home_projects"
root = "__PROJECTS_ROOT__"
trust_label = "untrusted"
watch_enabled = false
watch_priority = 100
max_indexed_files = 128
allow_roots = ["**"]
deny_globs = [
  "**/.git/**", "**/node_modules/**", "**/target/**", "**/dist/**", "**/build/**",
  "**/.venv/**", "**/venv/**", "**/__pycache__/**", "**/.cache/**", "**/*.db",
  "**/*.sqlite", "**/*.jpg", "**/*.png", "**/*.mp4"
]

[[workspace.domains]]
id = "home_codex"
root = "__HOME_ROOT__/.codex"
trust_label = "untrusted"
watch_enabled = false
watch_priority = 60
allow_hidden_paths = true
allow_roots = ["config.toml", "rules/*.rules", "skills/**/*.md"]
deny_globs = []

[filter]
mode = "repo_first"
allow_roots = ["**"]
deny_globs = [
  "**/.git/**", "**/node_modules/**", "**/target/**", "**/dist/**", "**/build/**",
  "**/.venv/**", "**/venv/**", "**/__pycache__/**", "**/.cache/**", "**/*.db",
  "**/*.sqlite", "**/*.jpg", "**/*.png", "**/*.mp4"
]
max_file_mb = 5

[index]
debounce_ms = 500
publish_mode = "two_phase"
chunk_max_lines = 120
chunk_overlap_lines = 20
bulk_event_threshold = 80
hotset_max_paths = 32
pending_path_report_limit = 20

[embedding]
model = "bge-small-en-v1.5"
runtime = "hash"
quantization = "int8"
dimension = 384
batch_size = 64

[retrieval]
rrf_mode = "plain"
rrf_k = 60
topn_symbol = 10
topn_bm25 = 12
topn_vector = 10
topn_final = 5
symbol_exact_boost = 2.0
symbol_prefix_boost = 1.2
allow_stale = false
code_path_boost = 1.15
docs_path_penalty = 0.85
test_path_penalty = 0.95
asset_path_penalty = 0.45
recency_half_life_hours = 24.0
recency_min_boost = 0.85
recency_max_boost = 1.20

[fuse_cache]
max_virtual_inodes = 50000
max_cached_mb = 256
entry_ttl_ms = 300
attr_ttl_ms = 300

[fuse_session]
mode = "pinned"
max_entries = 512

[map]
base_summary_mode = "deterministic_precompute"
llm_enrichment = "async_optional"
cache_ttl_sec = 3600

[policy]
read_only = true
deny_secret_paths = true
search_result_redaction = true
trust_labels = ["trusted", "untrusted"]

[observability]
metrics_bind = "127.0.0.1:9464"
health_bind = "127.0.0.1:9465"
log_level = "info"

[mcp]
enabled = true
mode = "minimal"

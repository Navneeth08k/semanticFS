[workspace]
repo_root = "."
mount_point = "/mnt/ai"

[workspace.scheduler]
max_watch_targets = 0

[[workspace.domains]]
id = "workspace_meta"
root = "."
trust_label = "untrusted"
watch_enabled = false
watch_priority = 5
allow_roots = ["Cargo.toml", "Cargo.lock", "README.md"]
deny_globs = []

[[workspace.domains]]
id = "code"
root = "./crates"
trust_label = "trusted"
watch_priority = 100
allow_roots = ["**"]
deny_globs = []

[[workspace.domains]]
id = "docs"
root = "./docs"
trust_label = "untrusted"
watch_priority = 40
allow_roots = ["**"]
deny_globs = []

[[workspace.domains]]
id = "config"
root = "./config"
trust_label = "trusted"
watch_priority = 90
allow_roots = ["semanticfs.sample.toml", "relevance-real.toml", "relevance-ai-testgen.toml", "relevance-multiroot.toml"]
deny_globs = []

[[workspace.domains]]

[workspace]
repo_root = "."
mount_point = "/mnt/ai"

[[workspace.domains]]
id = "workspace_meta"
root = "."
trust_label = "untrusted"
allow_roots = ["Cargo.toml", "Cargo.lock", "README.md"]
deny_globs = []

[[workspace.domains]]
id = "code"
root = "./crates"
trust_label = "trusted"
allow_roots = ["**"]
deny_globs = []

[[workspace.domains]]
id = "docs"
root = "./docs"
trust_label = "untrusted"
allow_roots = ["**"]
deny_globs = []

[[workspace.domains]]
id = "config"
root = "./config"
trust_label = "trusted"
allow_roots = ["semanticfs.sample.toml", "relevance-real.toml", "relevance-ai-testgen.toml", "relevance-multiroot.toml"]
deny_globs = []

[[workspace.domains]]
id = "scripts"
root = "./scripts"
trust_label = "trusted"
allow_roots = ["nightly_representative.ps1", "daytime_action_items.ps1", "bootstrap_golden_from_repo.py", "build_phase3_domain_plan.ps1"]
deny_globs = []

[[workspace.domains]]
id = "systemd"
root = "./systemd"
trust_label = "trusted"
allow_roots = [
  "semanticfs-fuse.service",
  "semanticfs-indexer.service",
  "semanticfs-mcp.service",
  "semanticfs-observability.service",
]
deny_globs = []

[[workspace.domains]]
id = "github"
root = "./.github"
trust_label = "untrusted"
allow_roots = ["workflows/ci.yml"]
deny_globs = []

[[workspace.domains]]
id = "fixture_repo"
root = "./tests/fixtures/benchmark_repo"
trust_label = "untrusted"
allow_roots = ["**"]
deny_globs = []

[filter]
mode = "repo_first"
allow_roots = ["**"]
deny_globs = [
  "**/.git/**", "**/node_modules/**", "**/target/**", "**/dist/**", "**/build/**",
  "**/.next/**", "**/.nuxt/**", "**/.svelte-kit/**", "**/.turbo/**", "**/.dart_tool/**",
  "**/.venv/**", "**/venv/**", "**/__pycache__/**", "**/.cache/**", "**/.idea/**",
  "**/coverage/**", "**/out/**",
  "**/.DS_Store", "**/Library/**", "**/Trash/**", "**/*.jpg", "**/*.png", "**/*.mp4",
  "**/tests/retrieval_golden/**", "**/config/relevance-*.toml",
  "**/.semanticfs/**", "**/target_daytime/**",
  "**/*.db", "**/*.db-*", "**/*.sqlite", "**/*.sqlite-*"
]
max_file_mb = 10

[index]
debounce_ms = 500
publish_mode = "two_phase"
chunk_max_lines = 120
chunk_overlap_lines = 20
bulk_event_threshold = 80
hotset_max_paths = 32
pending_path_report_limit = 20

[embedding]
model = "bge-small-en-v1.5"
runtime = "hash"
quantization = "int8"
dimension = 384
batch_size = 64

[retrieval]
rrf_mode = "plain"
rrf_k = 60
topn_symbol = 10
topn_bm25 = 12
topn_vector = 12
topn_final = 5
symbol_exact_boost = 2.0
symbol_prefix_boost = 1.2
allow_stale = false
code_path_boost = 1.15
docs_path_penalty = 0.85
test_path_penalty = 0.95
asset_path_penalty = 0.45
recency_half_life_hours = 24.0
recency_min_boost = 0.85
recency_max_boost = 1.20

[fuse_cache]
max_virtual_inodes = 50000
max_cached_mb = 256
entry_ttl_ms = 300
attr_ttl_ms = 300

[fuse_session]
mode = "pinned"
max_entries = 512

[map]
base_summary_mode = "deterministic_precompute"
llm_enrichment = "async_optional"
cache_ttl_sec = 3600

[policy]
read_only = true
deny_secret_paths = true
search_result_redaction = true
trust_labels = ["trusted", "untrusted"]

[observability]
metrics_bind = "127.0.0.1:9464"
health_bind = "127.0.0.1:9465"
log_level = "info"

[mcp]
enabled = true
mode = "minimal"

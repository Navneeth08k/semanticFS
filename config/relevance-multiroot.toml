trust_label = "untrusted"
watch_enabled = false
watch_priority = 9
max_indexed_files = 2
allow_roots = ["a_agent_lookup_playbook.md", "b_cache_trim_policy.md", "z_unbounded_host_sweeps.md"]
deny_globs = []


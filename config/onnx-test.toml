[workspace]
repo_root = "c:/Users/navneeth/Desktop/NavneethThings/Projects/semanticFS"
mount_point = "/mnt/ai"

[filter]
mode = "repo_first"
allow_roots = ["src/**", "lib/**", "apps/**", "services/**", "docs/**", "configs/**"]
deny_globs = [
  "**/.git/**", "**/node_modules/**", "**/target/**", "**/dist/**", "**/build/**",
  "**/.venv/**", "**/venv/**", "**/__pycache__/**", "**/.cache/**", "**/.idea/**",
  "**/.DS_Store", "**/Library/**", "**/Trash/**", "**/*.jpg", "**/*.png", "**/*.mp4"
]
max_file_mb = 10

[index]
debounce_ms = 500
publish_mode = "two_phase"
chunk_max_lines = 120
chunk_overlap_lines = 20

[embedding]
model = "bge-small-en-v1.5"
runtime = "onnx"
quantization = "int8"
dimension = 384
batch_size = 32

[retrieval]
rrf_mode = "plain"
rrf_k = 60
topn_symbol = 10
topn_bm25 = 20
topn_vector = 20
topn_final = 5
symbol_exact_boost = 2.0
symbol_prefix_boost = 1.2
allow_stale = false

[fuse_cache]
max_virtual_inodes = 50000
max_cached_mb = 256
entry_ttl_ms = 300
attr_ttl_ms = 300

[map]
base_summary_mode = "deterministic_precompute"
llm_enrichment = "async_optional"
cache_ttl_sec = 3600

[policy]
read_only = true
deny_secret_paths = true
search_result_redaction = true
trust_labels = ["trusted", "untrusted"]

[observability]
metrics_bind = "127.0.0.1:9464"
health_bind = "127.0.0.1:9465"
log_level = "info"

[mcp]
enabled = true
mode = "minimal"
